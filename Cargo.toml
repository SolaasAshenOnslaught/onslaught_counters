
[package]
name = "mirth_engine_tickers"
version = "0.0.1"
edition = "2024"
description = "A Bevy plugin with types (and their systems) purposed for tracking continously changing values over a given period of time."
license = "MIT OR Apache-2.0"

[dependencies]
bevy_app = { version = "0.19.0", default-features = false }
bevy_ecs = { version = "0.19.0", default-features = false }
bevy_reflect = { version = "0.19.0", default-features = false, optional = true }
bevy_time = { version = "0.19.0", default-features = false, optional = true }
serde = { version = "1", default-features = false, features = ["derive"], optional = true }
mirth_engine_testing_tools = { version = "0.0.5", optional = true }

[features]
default = [
    "ticker_serialize",
    "ticker_reflect_i8_f32",
    "ticker_systems_i8_f32",
]

########################### TICKER FEATURES ###############################

# Enable this when running the examples.  Adds the mirth_engine_testing_tools dependency,
# which is why this is disabled by default — it should never be on in a shipped game.
ticker_testing = ["mirth_engine_testing_tools"]

# Activated automatically when any per-type ticker_reflect feature is enabled.
# Can also be enabled directly to make all Ticker types reflectable at once.
# Enables reflection for use with Bevy scenes, editors, and inspector tools.
# Also a prerequisite for serialization, but ticker_serialize must be enabled
# separately since Reflect has uses beyond serialization alone.
ticker_reflect = ["bevy_reflect", "bevy_app/bevy_reflect"]

# Enable the reflect feature(s) that correspond to the Ticker type(s) you plan to use.
# Each feature makes that specific Ticker type reflectable and registers it with Bevy's
# type registry, enabling scene support, editor inspection, and serialization for that type.
ticker_reflect_i8_f32 = ["ticker_reflect"]
ticker_reflect_i16_f32 = ["ticker_reflect"]
ticker_reflect_i32_f32 = ["ticker_reflect"]
ticker_reflect_i8_f64 = ["ticker_reflect"]
ticker_reflect_i16_f64 = ["ticker_reflect"]
ticker_reflect_i32_f64 = ["ticker_reflect"]

# Enable this alongside a ticker_reflect feature if you want to serialize and deserialize Ticker data
# (e.g. for a save system).  ticker_serialize alone is not enough — a ticker_reflect feature must also
# be enabled for serialization to work.
ticker_serialize = ["serde"]

# Enable the system(s) that correspond to the Ticker type(s) you plan to use.  Each system
# reads Bevy's Time resource and calls .tick() on every Ticker of the matching type each frame.
# These are optional so that users who want to drive tickers with their own custom systems can
# do so without pulling in the bevy_time dependency, and they are selectable so that only the systems
# needed for the Ticker types actually in use are running each frame.
ticker_systems_i8_f32 = ["bevy_time"]
ticker_systems_i16_f32 = ["bevy_time"]
ticker_systems_i32_f32 = ["bevy_time"]
ticker_systems_i8_f64 = ["bevy_time"]
ticker_systems_i16_f64 = ["bevy_time"]
ticker_systems_i32_f64 = ["bevy_time"]

# Enables reflection for all Ticker types without any systems or serialization.
# Use this when you want every Ticker type to be reflectable but intend to drive them
# with your own custom systems.
ticker_reflects = [
    "ticker_reflect_i8_f32",
    "ticker_reflect_i16_f32",
    "ticker_reflect_i32_f32",
    "ticker_reflect_i8_f64",
    "ticker_reflect_i16_f64",
    "ticker_reflect_i32_f64",
]

# Enables all Ticker types and their frame-time systems, without reflection or
# serialization.  Use this when you want the full set of types and systems but don't need
# scene support, editor inspection, or save functionality.
ticker_systems = [
    "ticker_systems_i8_f32",
    "ticker_systems_i16_f32",
    "ticker_systems_i32_f32",
    "ticker_systems_i8_f64",
    "ticker_systems_i16_f64",
    "ticker_systems_i32_f64",
]

# Enables everything the package offers: reflection and serialization for all Ticker types,
# and their frame-time systems.  ticker_testing is intentionally excluded since it is only
# needed for running examples.
ticker_all = [
    "ticker_serialize",
    "ticker_reflect_i8_f32",
    "ticker_reflect_i16_f32",
    "ticker_reflect_i32_f32",
    "ticker_reflect_i8_f64",
    "ticker_reflect_i16_f64",
    "ticker_reflect_i32_f64",
    "ticker_systems_i8_f32",
    "ticker_systems_i16_f32",
    "ticker_systems_i32_f32",
    "ticker_systems_i8_f64",
    "ticker_systems_i16_f64",
    "ticker_systems_i32_f64",
]
###########################################################################
